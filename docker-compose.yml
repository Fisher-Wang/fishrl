services:
  fishrl:
    user: ${DOCKER_UID}:${DOCKER_GID}
    build:
      context: .
      dockerfile: Dockerfile
      network: host
      args:
        - DOCKER_UID=${DOCKER_UID:-1000}
        - DOCKER_GID=${DOCKER_GID:-1000}
        - DOCKER_USER=${DOCKER_USER:-user}
    container_name: fishrl
    privileged: true
    runtime: nvidia
    environment:
      - LD_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu
      - UV_HTTP_TIMEOUT=300
      ## Below is for IsaacSim/IsaacLab Accept EULA, see:
      ## - https://isaac-sim.github.io/IsaacLab/main/source/deployment/docker.html#running-pre-built-isaac-lab-container
      ## - https://docs.omniverse.nvidia.com/isaacsim/latest/installation/install_python.html#running-isaac-sim
      - ACCEPT_EULA=Y
      - PRIVACY_CONSENT=Y
      - OMNI_KIT_ACCEPT_EULA=YES
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /usr/local/cuda:/usr/local/cuda
      - ./:/home/${DOCKER_USER}/fishrl
      - ${HOME}/.maniskill:/home/${DOCKER_USER}/.maniskill
      - ${HOME}/.cache/uv:/home/${DOCKER_USER}/.cache/uv
      - ${HOME}/.ssh:/home/${DOCKER_USER}/.ssh
      - ${HOME}/pkg:/home/${DOCKER_USER}/pkg
    extra_hosts:
      - "localhost:127.0.0.1"
    tty: true  # Keeps the container running interactively
    network_mode: host
